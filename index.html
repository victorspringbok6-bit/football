<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Style of Play Analyzer Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background-color: #0b0f17; color: #f3f4f6; font-family: ui-sans-serif, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0b0f17; }
::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
/* Input styling overrides to prevent iOS default zooming */
input, textarea { font-size: 16px !important; }
@media (min-width: 768px) { input, textarea { font-size: 0.75rem !important; } }
</style>
</head>
<body class="p-3 sm:p-6 max-w-5xl mx-auto pb-12">
<div class="flex flex-col lg:flex-row lg:items-stretch justify-between gap-4 mb-6 border-b border-gray-800 pb-6">
<div class="flex-1 flex flex-col justify-between">
<div>
<h1 class="text-lg sm:text-xl font-bold text-white">Style of Play Analyzer Pro</h1>
<p class="text-[11px] sm:text-xs text-gray-400 mt-0.5">Global Live Slate — Focus: Pure H2H Trajectory & Direct Entry</p>
</div>
<div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 mt-4">
<div id="quotaDisplay" class="text-xs bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-400 hidden text-center sm:text-left h-full flex items-center justify-center sm:justify-start min-h-[38px]">
Remaining: &nbsp;<span id="apiRemaining" class="text-green-500 font-bold">-</span> / <span id="apiLimit">-</span>
</div>
<div class="flex items-center gap-2 w-full sm:w-auto">
<input type="password" id="apiKeyInput" placeholder="Enter API Key" class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-green-500 flex-1 sm:w-44 min-h-[38px]">
<button onclick="saveApiKey()" class="bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-2 rounded transition font-semibold whitespace-nowrap min-h-[38px]">Save Key</button>
</div>
<button onclick="fetchTodayFixtures()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-4 py-2 rounded transition font-semibold text-center whitespace-nowrap w-full sm:w-auto min-h-[38px]">Load Today's Matches</button>
</div>
</div>

<div class="w-full lg:w-96 bg-[#121620] border border-gray-800 rounded-lg p-3.5 flex flex-col justify-between">
<div>
<label class="block text-[10px] sm:text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Add Custom Matches Manually</label>
<textarea id="manualInput" rows="2" placeholder="Paste text containing match / team names..." class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-xs text-white focus:outline-none focus:border-purple-500 resize-none mb-2 min-h-[50px]"></textarea>
</div>
<button onclick="processManualInput()" class="w-full bg-purple-600 hover:bg-purple-500 text-white text-xs font-semibold py-2 rounded transition min-h-[38px]">Inject & Check Matches</button>
</div>
</div>

<div id="actionBar" class="hidden bg-[#121620] border border-gray-800 p-3 rounded-lg mb-6 flex flex-col gap-3.5">
<div class="flex flex-col gap-2">
<span class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Filter View:</span>
<div class="grid grid-cols-2 sm:flex sm:flex-wrap items-center gap-2">
<button onclick="filterDashboard('all')" id="filter-all" class="bg-gray-800 text-white text-xs px-2.5 py-2 rounded font-medium border border-gray-700 transition text-center min-h-[36px]">All Active (<span id="cnt-all">0</span>)</button>
<button onclick="filterDashboard('over')" id="filter-over" class="bg-gray-900 text-gray-400 text-xs px-2.5 py-2 rounded font-medium border border-transparent hover:border-gray-700 transition text-center min-h-[36px]">🔥 Over 2.5 (<span id="cnt-over">0</span>)</button>
<button onclick="filterDashboard('under')" id="filter-under" class="bg-gray-900 text-gray-400 text-xs px-2.5 py-2 rounded font-medium border border-transparent hover:border-gray-700 transition text-center min-h-[36px]">🛡️ Under 2.5 (<span id="cnt-under">0</span>)</button>
<button onclick="filterDashboard('unscanned')" id="filter-unscanned" class="bg-gray-900 text-gray-400 text-xs px-2.5 py-2 rounded font-medium border border-transparent hover:border-gray-700 transition text-center min-h-[36px]">⏳ Unscanned (<span id="cnt-unscanned">0</span>)</button>
</div>
</div>
<div class="flex items-center gap-2 w-full pt-1 border-t border-gray-800/60 md:border-t-0 md:pt-0 justify-end">
<button id="batchScanBtn" onclick="runBatchScan()" class="bg-purple-600 hover:bg-purple-500 text-white text-xs px-4 py-2 rounded transition font-semibold text-center whitespace-nowrap flex-1 sm:flex-none min-h-[36px]">Scan Remaining Matches</button>
<button onclick="exportSelections()" class="bg-amber-600 hover:bg-amber-500 text-white text-xs px-3 py-2 rounded font-semibold transition flex items-center justify-center gap-1 min-h-[36px]">📋 Copy</button>
</div>
</div>

<div id="dashboardContainer" class="space-y-6">
<div>
<h2 class="text-xs font-bold tracking-wider text-blue-500 uppercase flex items-center gap-1.5 mb-3 px-0.5">📅 UPCOMING TARGET WINDOW (<span id="targetCount">0</span>)</h2>
<div id="targetsContainer" class="space-y-3"></div>
</div>
<div id="emptyState" class="text-center py-12 text-sm text-gray-500 px-4">Enter your API key and click "Load Matches" or add custom values manually to get started.</div>
</div>

<script>
let apiKey = localStorage.getItem('api_football_key') || "";
let allFixtures = [];
let unscannedFixtureIds = [];
let scanResults = {};
let activeFilter = 'all'; 

function init() {
apiKey = localStorage.getItem('api_football_key') || "";
document.getElementById('apiKeyInput').value = apiKey;
}

function updateQuotaHeaders(headers) {
const limit = headers.get('x-ratelimit-requests-limit') || headers.get('X-RateLimit-Requests-Limit');
const remaining = headers.get('x-ratelimit-requests-remaining') || headers.get('X-RateLimit-Requests-Remaining');
if (limit && remaining) {
document.getElementById('apiLimit').innerText = limit;
document.getElementById('apiRemaining').innerText = remaining;
document.getElementById('quotaDisplay').classList.remove('hidden');
}
}

async function fetchTodayFixtures() {
if (!apiKey) {
alert("Please enter and save your API key first.");
return;
}
const container = document.getElementById('targetsContainer');
container.innerHTML = "<div class='text-gray-400 text-sm animate-pulse p-2 text-center sm:text-left'>Syncing upcoming match slate...</div>";
document.getElementById('emptyState').classList.add('hidden');
document.getElementById('actionBar').classList.add('hidden');
allFixtures = [];
scanResults = {};

const tzoffset = (new Date()).getTimezoneOffset() * 60000;
const todayStr = (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
const nowTimestamp = Date.now();

try {
const response = await fetch(`https://v3.football.api-sports.io/fixtures?date=${todayStr}`, {
"method": "GET",
"headers": { "x-apisports-key": apiKey }
});
updateQuotaHeaders(response.headers);
const data = await response.json();

if (data.response && data.response.length > 0) {
allFixtures = data.response.filter(f => {
const isNotStarted = f.fixture.status.short === 'NS';
const isFutureMatch = new Date(f.fixture.date).getTime() > nowTimestamp;
return isNotStarted && isFutureMatch;
});
}

unscannedFixtureIds = allFixtures.map(f => f.fixture.id);
renderAllFixtures();

if (allFixtures.length > 0) {
document.getElementById('actionBar').classList.remove('hidden');
updateBatchButtonText();
updateFilterCounters();
filterDashboard('all'); 
} else {
container.innerHTML = "<div class='text-gray-400 text-sm text-center p-4'>No future 'Not Started' matches remaining for today's card.</div>";
}
} catch (err) {
container.innerHTML = "<div class='text-red-500 text-sm text-center p-4'>Network error. Check connection or token configuration.</div>";
}
}

async function makeSearchCall(searchString, todayStr) {
try {
const response = await fetch(`https://v3.football.api-sports.io/fixtures?date=${todayStr}&search=${encodeURIComponent(searchString)}`, {
    "method": "GET",
    "headers": { "x-apisports-key": apiKey }
});
const resData = await response.json();
if (resData.response && resData.response.length > 0) {
    let addedAny = false;
    resData.response.forEach(matchedFixture => {
        const isDuplicate = allFixtures.some(f => f.fixture.id === matchedFixture.fixture.id);
        if (!isDuplicate && matchedFixture.fixture.status.short === 'NS') {
            allFixtures.push(matchedFixture);
            unscannedFixtureIds.push(matchedFixture.fixture.id);
            addedAny = true;
        }
    });
    return addedAny; 
}
} catch (e) {
console.error("Search failed for: ", searchString, e);
}
return false;
}

async function processManualInput() {
if (!apiKey) {
alert("Please provide an API Key first.");
return;
}
const txt = document.getElementById('manualInput').value.trim();
if (!txt) return;

const tzoffset = (new Date()).getTimezoneOffset() * 60000;
const todayStr = (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];

const lines = txt.split(/\n|,/).map(s => s.trim()).filter(s => s.length > 2);
if (lines.length === 0) return;

document.getElementById('emptyState').classList.add('hidden');
document.getElementById('actionBar').classList.remove('hidden');

const cleaningRegex = /\b(nk|fc|afc|ud|cd|sc|ac|cs|fk|as|sv|bsc|cf|sd|club|deportivo|atletico)\b/gi;

for (let line of lines) {
let searchTerms = line.split(/\bvs\b|\bv\b/i).map(t => t.trim()); 

for (let term of searchTerms) {
    let cleanQuery = term.replace(cleaningRegex, '').replace(/[^a-zA-Z0-9 ]/g, '').replace(/\s+/g, ' ').trim();
    if (cleanQuery.length < 3) continue;

    const lowerQuery = cleanQuery.toLowerCase();
    const alreadyExists = allFixtures.some(f => 
        f.teams.home.name.toLowerCase().includes(lowerQuery) || 
        f.teams.away.name.toLowerCase().includes(lowerQuery)
    );
    if (alreadyExists) continue; 

    let success = await makeSearchCall(cleanQuery, todayStr);

    if (!success) {
        let words = cleanQuery.split(' ').filter(w => w.length > 3);
        for (let word of words) {
            let fallbackHit = await makeSearchCall(word, todayStr);
            if (fallbackHit) break; 
        }
    }
}
}

document.getElementById('manualInput').value = "";
renderAllFixtures();
updateBatchButtonText();
updateFilterCounters();
}

function renderAllFixtures() {
const container = document.getElementById('targetsContainer');
if (allFixtures.length === 0) {
document.getElementById('targetCount').innerText = "0";
container.innerHTML = "";
document.getElementById('emptyState').classList.remove('hidden');
return;
}

let sortedFixtures = [...allFixtures];

if (activeFilter === 'over') {
sortedFixtures = sortedFixtures
.filter(f => scanResults[f.fixture.id] !== undefined && scanResults[f.fixture.id].h2hPct >= 40)
.sort((a, b) => scanResults[b.fixture.id].h2hPct - scanResults[a.fixture.id].h2hPct);
} else if (activeFilter === 'under') {
sortedFixtures = sortedFixtures
.filter(f => scanResults[f.fixture.id] !== undefined && scanResults[f.fixture.id].h2hPct < 40)
.sort((a, b) => scanResults[a.fixture.id].h2hPct - scanResults[b.fixture.id].h2hPct);
}

document.getElementById('targetCount').innerText = sortedFixtures.length;

let htmlBuffer = "";
sortedFixtures.forEach(item => {
const dateObj = new Date(item.fixture.date);
const formattedTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
const homeScore = item.goals.home !== null ? item.goals.home : 0;
const awayScore = item.goals.away !== null ? item.goals.away : 0;

const res = scanResults[item.fixture.id];
const isUnscanned = unscannedFixtureIds.includes(item.fixture.id);

let displayClass = "";
if (activeFilter === 'unscanned' && !isUnscanned) displayClass = "hidden";

let cardBorderColor = "border-gray-900 bg-[#121620]";
if (res) {
if (res.h2hPct >= 40) {
cardBorderColor = "border-purple-500/50 bg-purple-950/10";
} else {
cardBorderColor = "border-blue-500/30 bg-blue-950/10";
}
}

htmlBuffer += `
<div id="card-${item.fixture.id}" class="fixture-card ${cardBorderColor} rounded-lg p-3 sm:p-4 flex flex-col gap-3 shadow-md border transition-all duration-300 ${displayClass}">
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
<div class="flex items-start gap-2.5 min-w-0 flex-1">
<div class="text-[10px] font-bold text-gray-500 tracking-wider mt-0.5 whitespace-nowrap flex flex-col min-w-[55px]">
<span>${formattedTime}</span>
<span class="text-green-500 text-[9px] uppercase tracking-normal">Unstarted</span>
</div>
<div class="min-w-0 flex-1">
<h3 class="text-white font-bold text-sm tracking-wide leading-snug break-words pr-2">
<span class="home-name">${item.teams.home.name}</span>  
<span class="text-gray-500 font-normal mx-0.5">v</span>  
<span class="away-name">${item.teams.away.name}</span>
<span class="text-amber-400 font-mono text-xs whitespace-nowrap">(${homeScore}-${awayScore})</span>
</h3>
<span class="text-[10px] text-gray-400 font-light flex items-center gap-1 truncate mt-0.5">🚩 <span class="league-info">${item.league.country} - ${item.league.name}</span></span>
</div>
</div>
<div class="flex items-center justify-end w-full sm:w-auto pt-2 border-t border-gray-800/40 sm:border-t-0 sm:pt-0">
<button id="btn-${item.fixture.id}" onclick="analyzeForm(${item.fixture.id}, ${item.teams.home.id}, ${item.teams.away.id})" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-semibold px-4 py-2 sm:py-1 rounded transition w-full sm:w-auto min-h-[34px] sm:min-h-0 ${res ? 'bg-gray-800 text-gray-500 pointer-events-none' : ''}">${res ? 'Analyzed' : 'Analyze Match'}</button>
</div>
</div>
<div id="analysis-${item.fixture.id}" class="${res ? '' : 'hidden'} mt-1 bg-gray-900/40 border border-gray-800/80 rounded p-1 text-xs text-gray-300 flex flex-col gap-1">
${res ? res.dropdownHtml : ''}
</div>
</div>
`;
});
container.innerHTML = htmlBuffer;
}

function updateBatchButtonText() {
const btn = document.getElementById('batchScanBtn');
const remaining = unscannedFixtureIds.length;
if (remaining === 0) {
btn.innerText = "All Matches Scanned";
btn.disabled = true;
btn.classList.add('opacity-50', 'cursor-not-allowed');
} else {
btn.innerText = `Scan Remaining (${remaining})`;
}
}

function updateFilterCounters() {
let total = allFixtures.length;
let unscannedCount = unscannedFixtureIds.length;

let overCount = 0;
let underCount = 0;
Object.values(scanResults).forEach(res => {
if (res.h2hPct >= 40) overCount++;
else underCount++;
});

document.getElementById('cnt-all').innerText = total;
document.getElementById('cnt-over').innerText = overCount;
document.getElementById('cnt-under').innerText = underCount;
document.getElementById('cnt-unscanned').innerText = unscannedCount;
}

function filterDashboard(type) {
activeFilter = type;
const buttons = ['all', 'over', 'under', 'unscanned'];
buttons.forEach(btnType => {
const el = document.getElementById(`filter-${btnType}`);
if (!el) return;
if (btnType === type) {
el.classList.remove('bg-gray-900', 'text-gray-400', 'border-transparent');
el.classList.add('bg-gray-800', 'text-white', 'border-gray-700');
} else {
el.classList.remove('bg-gray-800', 'text-white', 'border-gray-700');
el.classList.add('bg-gray-900', 'text-gray-400', 'border-transparent');
}
});
renderAllFixtures();
}

async function runBatchScan() {
const btn = document.getElementById('batchScanBtn');
btn.disabled = true;

while (unscannedFixtureIds.length > 0) {
const nextId = unscannedFixtureIds[0];
btn.innerText = `Scanning... (${unscannedFixtureIds.length})`;
const match = allFixtures.find(f => f.fixture.id === nextId);
if (match) {
await analyzeForm(match.fixture.id, match.teams.home.id, match.teams.away.id);
await new Promise(resolve => setTimeout(resolve, 200));
} else {
unscannedFixtureIds.shift();
}
}

btn.disabled = false;
updateBatchButtonText();
}

async function fetchTeamLast5(teamId) {
const response = await fetch(`https://v3.football.api-sports.io/fixtures?team=${teamId}&last=5`, {
"method": "GET",
"headers": { "x-apisports-key": apiKey }
});
updateQuotaHeaders(response.headers);
const data = await response.json();
return data.response || [];
}

async function fetchH2H(homeId, awayId) {
const response = await fetch(`https://v3.football.api-sports.io/fixtures/headtohead?h2h=${homeId}-${awayId}`, {
"method": "GET",
"headers": { "x-apisports-key": apiKey }
});
updateQuotaHeaders(response.headers);
const data = await response.json();
return (data.response || []).slice(0, 5);
}

function calculateOver25Stats(fixtures) {
if (fixtures.length === 0) return { over25Pct: 0, totalGoals: 0, avgGoals: 0, list: [] };
let over25Count = 0;
let totalGoalsSum = 0;
let matchDetailsList = [];
fixtures.forEach(f => {
const homeG = f.goals.home !== null ? f.goals.home : 0;
const awayG = f.goals.away !== null ? f.goals.away : 0;
const total = homeG + awayG;
totalGoalsSum += total;
if (total >= 3) over25Count++;
matchDetailsList.push({
home: f.teams.home.name,
away: f.teams.away.name,
score: `${homeG}-${awayG}`,
isOver: total >= 3
});
});
return {
over25Pct: Math.round((over25Count / fixtures.length) * 100),
avgGoals: (totalGoalsSum / fixtures.length).toFixed(2),
list: matchDetailsList
};
}

function generateDropdownHtml(id, title, stats, titleColorClass = "text-white") {
let itemsHtml = "";
if (stats.list.length === 0) {
itemsHtml = `<div class="p-2 text-[11px] text-gray-500 text-center">No history found.</div>`;
} else {
stats.list.forEach(m => {
const badgeColor = m.isOver ? "bg-purple-900/40 text-purple-400 border border-purple-800/60" : "bg-gray-800 text-gray-400";
itemsHtml += `
<div class="flex items-center justify-between p-2 border-b border-gray-800/50 last:border-0 text-[11px]">
<span class="truncate pr-2 text-gray-400">${m.home} <span class="text-gray-600">v</span> ${m.away}</span>
<div class="flex items-center gap-1.5 flex-shrink-0">
<span class="font-mono font-bold text-gray-300">${m.score}</span>
<span class="px-1 text-[9px] rounded font-semibold uppercase ${badgeColor}">${m.isOver ? 'O2.5' : 'U2.5'}</span>
</div>
</div>
`;
});
}
return `
<div class="border border-gray-800 rounded bg-gray-950/40 overflow-hidden">
<button onclick="toggleSectionDisplay('${id}')" class="w-full flex items-center justify-between p-2.5 hover:bg-gray-900/40 transition text-left min-h-[38px]">
<div class="flex flex-col sm:flex-row sm:items-center gap-0.5 sm:gap-1.5">
<span class="font-semibold text-xs ${titleColorClass}">${title}</span>
<span class="text-[10px] text-gray-500">O2.5: <strong class="text-purple-400">${stats.over25Pct}%</strong> | Avg: <strong class="text-gray-300">${stats.avgGoals}</strong></span>
</div>
<span id="icon-${id}" class="text-gray-500 text-[10px] transform transition-transform">▼</span>
</button>
<div id="content-${id}" class="hidden border-t border-gray-800/80 bg-[#0d111a] p-1 flex flex-col">
${itemsHtml}
</div>
</div>
`;
}

function toggleSectionDisplay(elementId) {
const content = document.getElementById('content-' + elementId);
const icon = document.getElementById('icon-' + elementId);
if (content.classList.contains('hidden')) {
content.classList.remove('hidden');
icon.style.transform = "rotate(180deg)";
} else {
content.classList.add('hidden');
icon.style.transform = "rotate(0deg)";
}
}

async function analyzeForm(fixtureId, homeId, awayId) {
const btn = document.getElementById(`btn-${fixtureId}`);
if (!btn || btn.innerText === "Analyzed") return;
if (btn.innerText !== "...") {
btn.disabled = true;
btn.innerText = "...";
}
try {
const [homeFixtures, awayFixtures, h2hFixtures] = await Promise.all([
fetchTeamLast5(homeId), 
fetchTeamLast5(awayId),
fetchH2H(homeId, awayId)
]);
const homeStats = calculateOver25Stats(homeFixtures);
const awayStats = calculateOver25Stats(awayFixtures);
const h2hStats = calculateOver25Stats(h2hFixtures);

const dropdownHtml = `
<div class="grid grid-cols-1 md:grid-cols-3 gap-2 p-1.5">
${generateDropdownHtml(`home-${fixtureId}`, "🏠 Home Form", homeStats, "text-white")}
${generateDropdownHtml(`away-${fixtureId}`, "🚀 Away Form", awayStats, "text-white")}
${generateDropdownHtml(`h2h-${fixtureId}`, "⚔️ Head-to-Head History", h2hStats, "text-amber-400")}
</div>
`;

scanResults[fixtureId] = {
h2hPct: h2hStats.over25Pct,
dropdownHtml: dropdownHtml
};

unscannedFixtureIds = unscannedFixtureIds.filter(idx => idx !== fixtureId);
updateFilterCounters();
filterDashboard(activeFilter);
} catch (err) {
unscannedFixtureIds = unscannedFixtureIds.filter(idx => idx !== fixtureId);
if(btn) {
btn.innerText = "Skipped";
btn.classList.add('text-gray-600');
}
}
}

function exportSelections() {
let logText = `--- STYLE OF PLAY METRIC SELECTIONS (${activeFilter.toUpperCase()} FILTER) ---\n`;
let count = 0;
allFixtures.forEach(item => {
const card = document.getElementById(`card-${item.fixture.id}`);
if (card && !card.classList.contains('hidden')) {
const res = scanResults[item.fixture.id];
const dateObj = new Date(item.fixture.date);
const formattedTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
logText += `[${formattedTime}] ${item.teams.home.name} vs ${item.teams.away.name} (${item.league.country} - ${item.league.name})`;
if (res) {
logText += ` -> H2H O2.5: ${res.h2hPct}%`;
} else {
logText += ` -> [UNSCANNED]`;
}
logText += `\n`;
count++;
}
});
if (count === 0) {
alert("No visible matches available to export.");
return;
}
navigator.clipboard.writeText(logText).then(() => {
alert(`Copied ${count} matches!`);
}).catch(err => {
alert("Failed to write clipboard data.");
});
}

function saveApiKey() {
const val = document.getElementById('apiKeyInput').value.trim();
if (val) {
apiKey = val;
localStorage.setItem('api_football_key', apiKey);
alert("API Key Saved!");
}
}
window.onload = init;
</script>
</body>
</html>
